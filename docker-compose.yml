
services:
  ai-sandbox:
    image: ai-sandbox
    container_name: ai-sandbox
    stdin_open: true
    tty: true
    volumes:
      - ${AI_DOCKER_BASE}/workspace:/workspace
      - ${AI_DOCKER_BASE}/claude-code-data/:/home/aiuser/
      - ${AI_DOCKER_BASE}/gemini-cli-data:/home/aiuser/
    working_dir: /workspace
    depends_on:
      - ollama
      - otel-collector
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - GEMINI_TELEMETRY_ENABLED=true
      - GEMINI_TELEMETRY_TARGET=local
      - GEMINI_TELEMETRY_USE_COLLECTOR=true
      - GEMINI_TELEMETRY_OTLP_ENDPOINT=http://otel-collector:4317
    env_file:
      - ${AI_SECRETS_BASE}/secrets/ai-sandbox/.env
      
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
  otel-collector:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector:0.142.0
    container_name: otel-collector
    command: ["--config=/otel-local-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/otel-local-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "9464:9464"   # métriques exposées pour Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - otel-collector
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  ollama:
  grafana-data:
