
services:
  ai-sandbox:
    image: ai-sandbox
    container_name: ai-sandbox
    stdin_open: true
    tty: true
    ports:
      - "6420:6420"  # backlog.md browser interface
    volumes:
      - ${AI_DOCKER_BASE}/workspace:/workspace
      - ${AI_DOCKER_BASE}/ai-cli-data/:/home/aiuser/
      - ~/.aws:/home/aiuser/.aws:ro
    working_dir: /workspace
    depends_on:
      - ollama
      - otel-collector
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - GEMINI_TELEMETRY_ENABLED=true
      - GEMINI_TELEMETRY_TARGET=local
      - GEMINI_TELEMETRY_USE_COLLECTOR=true
      - GEMINI_TELEMETRY_OTLP_ENDPOINT=http://otel-collector:4317
      - CLAUDE_CODE_ENABLE_TELEMETRY=1              # Enable OTel
      - OTEL_METRICS_EXPORTER=otlp                  # ou prometheus, console
      - OTEL_LOGS_EXPORTER=otlp                     # ou console
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      # For bedrock config
      - AWS_PROFILE=saml
      - AWS_REGION=eu-west-3

    env_file:
      - ${AI_SECRETS_BASE}/.env
      
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
  otel-collector:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector:0.142.0
    container_name: otel-collector
    command: ["--config=/otel-local-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/otel-local-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "9464:9464"   # métriques exposées pour Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - otel-collector
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana
      - ~/.aws:/usr/share/grafana/.aws:ro

volumes:
  ollama:
  grafana-data:
